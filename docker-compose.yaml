services:
  pocket-tts:
    build: .
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - hf_cache:/cache/huggingface
    environment:
      - PORT=${PORT:-8000}
      - HF_HOME=/cache/huggingface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 180s
    restart: unless-stopped

volumes:
  hf_cache:
